<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }
        body {
            width: 100%;
            height: 100vh;
            
        }
        #content {
            width: 100%;
            height: 100%;
        }
        #top_wrap {
            width: 1200px;
            height: 50px;
            margin-right: auto;
            margin-left: auto;
            text-align: center;
            font-size: 23px;
            font-weight: 700;
            color: #F24405;
        }
        #title_wrap {
            width: 1200px;
            height: 300px;
            background-color: #FEF5EF;
            margin: 0 auto;
            

        }
        #title_sub_comment {
            display: block;
            text-align: center;
            font-weight: 400;
            padding-top: 40px;
        }
        #title_box {
            width: 100%;
            height: 200px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }
        .title_box_son1.getcolor {
            background-color: #F24405;
            color: white;
        }

        .title_box_son1 {
            width: 20%;
            height: 60%;
            margin-top: 20px;
            background-color: white;
            display: flex;
            justify-content: center;
            border-radius: 15px;
            cursor: pointer;
        }

        #option_wrap {
            width: 1200px;
            height: 100px;
            background-color: #FEF5EF;
            display: flex;
            justify-content: center;
            margin: 20px auto;
        }
        #option_wrap_item {
            width: 900px;
            margin: 20px 5px;
        }
        #selectInput {
            width: 30%;
            height: 60px;
            background-color: white;
            border: none;
        }

        select {
            width: 30%;
            height: 60px;
            background-color: white;
            border: none;
            
        }

        #btn {
            width: 15%;
            height: 60px;
            align-self: center;
            cursor: pointer;
            display: flex;
            justify-content: center;
        }

        button {
            width: 100%;
            height: 60px;
            background-color: #F24405;
            align-self: center;
            font-size: x-large;
            color: #fff;
            cursor: pointer;
            border: #fff;
            border-radius: 5px;
        }

        button:hover {
            width: 90%;
            height: 90%;
            font-size: larger;
            transition: all 1s;
        } 
        input[type="date"]{
    background-color: #0080ff;
    color: #ffffff;
    border: none;
    outline: none;
}
    </style>
</head>
<body>
    <div id="content">
        <div id="top_wrap">
            대중교통 정보
        </div>
        <div id="title_wrap">
            <h4 id="title_sub_comment">교통수단별 전주 오시는 경로를 안내해드립니다.</h6>
            <div id="title_box">
                <div class="title_box_son1 getcolor">
                    <div id="imoticon"></div>
                    <h4>고속버스</h4>
                </div>
                <div class="title_box_son1">
                    <div id="imoticon"></div>
                    <h4>시외버스</h4>
                </div>
            </div>
        </div>
        <div id="option_wrap">
            <div id="option_wrap_item">
                <select name="start_lo">
                    <option>출발지</option>
                    <option value="100">인천</option>
                    <option></option>
                    <option></option>
                </select>
                <select name="end_lo">
                    <option>도착지</option>
                    <option value="602">전주</option>
                    <option></option>
                </select>
                <label for="selectInput">
                    <input id="selectInput" type="date" name="schedule" data-placeholder="출발일" min="2024-05-01" max="2024-05-30" />
                </label>
            </div>
            <div id="btn">
                <button onclick="onClick()">조회하기</button>
            </div>
        </div>
    </div>



    <script>
        function onClick() {
            let start_lo = $("select[name=start_lo] option:selected").val();
            let end_lo = $("select[name=end_lo] option:selected").val();
            let start_date = $("input[type=date]").val().replace(/[^0-9]/g,"");
            console.log(start_date);
        $.ajax({
            url: `https://apis.data.go.kr/1613000/ExpBusInfoService/getStrtpntAlocFndExpbusInfo?serviceKey=oHfkaY88BRbD4M%2Fyx0m%2FtGQPCrjTmC97aKXu0LTqSYr8GwNqviM39OcSFzo00QDQ%2F8wqx98BelfUj%2BrtOSwqyA%3D%3D&pageNo=1&numOfRows=10&_type=json&depTerminalId=NAEK${start_lo}&arrTerminalId=NAEK${end_lo}&depPlandTime=${start_date}&busGradeId=1`,
            type: "get",
            dataType: "json",
            success:function (data) {
                console.log(data.response.body.items);
            }
        })
        }
    </script> 
</body>
</html>
