<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }
        body {
            width: 100%;
            height: 100vh;
            
        }
        #content {
            width: 100%;
            height: 100%;
        }
        #top_wrap {
            width: 1200px;
            height: 50px;
            margin-right: auto;
            margin-left: auto;
            text-align: center;
            font-size: 23px;
            font-weight: 700;
            color: #F24405;
        }
        #title_wrap {
            width: 1200px;
            height: 300px;
            background-color: #FEF5EF;
            margin: 0 auto;
            

        }
        #title_sub_comment {
            display: block;
            text-align: center;
            font-weight: 400;
            padding-top: 40px;
        }
        #title_box {
            width: 100%;
            height: 200px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }
        .title_box_son1.getcolor {
            background-color: #F24405;
            color: white;
        }

        .title_box_son1 {
            width: 20%;
            height: 60%;
            margin-top: 20px;
            background-color: white;
            display: flex;
            justify-content: center;
            border-radius: 15px;
            cursor: pointer;
        }

        #option_wrap {
            width: 1200px;
            height: 100px;
            background-color: #FEF5EF;
            display: flex;
            justify-content: center;
            margin: 20px auto;
        }
        #option_wrap_item {
            width: 900px;
            margin: 20px 5px;
        }
        #selectInput {
            width: 30%;
            height: 60px;
            background-color: white;
            border: none;
        }

        select {
            width: 30%;
            height: 60px;
            background-color: white;
            border: none;
            
        }

        #btn {
            width: 15%;
            height: 60px;
            align-self: center;
            cursor: pointer;
            display: flex;
            justify-content: center;
        }

        button {
            width: 100%;
            height: 60px;
            background-color: #F24405;
            align-self: center;
            font-size: x-large;
            color: #fff;
            cursor: pointer;
            border: #fff;
            border-radius: 5px;
        }

        button:hover {
            width: 90%;
            height: 90%;
            font-size: larger;
            transition: all 1s;
        } 
        input[type="date"]{
            background-color: #0080ff;
            color: #ffffff;
            border: none;
            outline: none;
        }
        #result_wrap {
			width: 1200px;
            height: auto;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(4,1fr);
            grid-template-rows: auto;
		}
        #result_wrap div {
            width: 100%;
            height: 50px;
            font-size: larger;
            font-weight: 500;
            text-align: center;
        }
        #result_wrap div:last-child {
            padding-bottom: 100px;
        }
        .result_wrap_head {
            background-color: #F24405;
        }
    </style>
</head>
<body>
    <div id="content">
        <div id="top_wrap">
            대중교통 정보
        </div>
        <div id="title_wrap">
            <h4 id="title_sub_comment">교통수단별 전주 오시는 경로를 안내해드립니다.</h6>
            <div id="title_box">
                <div class="title_box_son1 getcolor">
                    <div id="imoticon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="0.86em" height="1em" viewBox="0 0 1536 1792"><path fill="currentColor" d="M384 1216q0-53-37.5-90.5T256 1088t-90.5 37.5T128 1216t37.5 90.5T256 1344t90.5-37.5T384 1216m1024 0q0-53-37.5-90.5T1280 1088t-90.5 37.5t-37.5 90.5t37.5 90.5t90.5 37.5t90.5-37.5t37.5-90.5m-46-396l-72-384q-5-23-22.5-37.5T1227 384H309q-23 0-40.5 14.5T246 436l-72 384q-5 30 14 53t49 23h1062q30 0 49-23t14-53m-226-612q0-20-14-34t-34-14H448q-20 0-34 14t-14 34t14 34t34 14h640q20 0 34-14t14-34m400 725v603h-128v128q0 53-37.5 90.5T1280 1792t-90.5-37.5t-37.5-90.5v-128H384v128q0 53-37.5 90.5T256 1792t-90.5-37.5T128 1664v-128H0V933q0-112 25-223l103-454q9-78 97.5-137t230-89T768 0t312.5 30t230 89t97.5 137l105 454q23 102 23 223"/></svg>
                    </div>
                    <h4>고속버스</h4>
                </div>
                <div class="title_box_son1">
                    <div id="imoticon"></div>
                    <h4>시외버스</h4>
                </div>
            </div>
        </div>
        <div id="option_wrap">
            <div id="option_wrap_item">
                <select name="start_lo">
                    <option>출발지</option>
                    <option value="100">인천</option>
                    <option></option>
                    <option></option>
                </select>
                <select name="end_lo">
                    <option>도착지</option>
                    <option value="602">전주</option>
                    <option></option>
                </select>
                <label for="selectInput">
                    <input id="selectInput" type="date" name="schedule" data-placeholder="출발일" min="2024-05-01" max="2024-05-30" />
                </label>
            </div>
            <div id="btn">
                <button onclick="onClick()">조회하기</button>
            </div>
        </div>
        <div id="result_wrap">

        </div>
    </div>



    <script>

        let result_wrap = $("#result_wrap");
		



		function make_menu_Layout() {
			result_wrap.prepend("<div class='result_wrap_head'>출발시간</div><div class='result_wrap_head'>도착시간</div><div class='result_wrap_head'>등급</div><div class='result_wrap_head'>가격</div>");
		}
        let is_showed = false;




        function onClick() {
            let start_lo = $("select[name=start_lo] option:selected").val();
            let end_lo = $("select[name=end_lo] option:selected").val();
            let start_date = $("input[type=date]").val().replace(/[^0-9]/g,"");
            console.log(start_date);
        $.ajax({
            url: `https://apis.data.go.kr/1613000/ExpBusInfoService/getStrtpntAlocFndExpbusInfo?serviceKey=oHfkaY88BRbD4M%2Fyx0m%2FtGQPCrjTmC97aKXu0LTqSYr8GwNqviM39OcSFzo00QDQ%2F8wqx98BelfUj%2BrtOSwqyA%3D%3D&pageNo=1&numOfRows=15&_type=json&depTerminalId=NAEK${start_lo}&arrTerminalId=NAEK${end_lo}&depPlandTime=${start_date}&busGradeId=1`,
            type: "get",
            dataType: "json",
            success:function (data) {
                make_menu_Layout();
                let result = data.response.body.items.item;
                result.forEach(function(item) {
                    result_wrap.append("<div><h6>"+item.depPlandTimed+"</h6></div><div><h6>"+item.arrPlandTime+"</h6></div><div><h6>"+item.gradeNm+"</h6></div><div><h6>"+item.charge+"원</h6></div>");
                });
                is_showed = true;
                console.log(data.response.body.items.item);
            }
        })
        }
    </script> 
</body>
</html>
