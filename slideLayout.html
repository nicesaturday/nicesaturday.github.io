<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }
        body {
            width: 100%;
            height: 100vh;
        }
        #content {
            width: 200px;
            height: 200px;
            background-color: rgb(255, 255, 255);
            position: relative;
            white-space: nowrap;
            right: -40%;
            top: 40%;
            overflow: hidden;
        }
        .box {
            width: 200px;
            height: 200px;
            display: inline-block;
            transition: all 2s;
        }
        #box1 {
            background-color: aqua;      
        }
        #box2 {
            background-color: rgb(34, 101, 189);
        }
        #box3 {
            background-color: rgb(187, 116, 30);
        }
        #box4 {
            background-color: rgb(126, 33, 106);
        }
    </style>
</head>
<body>
    <div id="content">
        <div class="box" id="box1"></div>
        <div class="box" id="box2"></div>
        <div class="box" id="box3"></div>
        <div class="box" id="box4"></div>
    </div>
    <button id="r_btn">right</button>
    <button id="l_btn">left</button>
    

      
    </div>
    <script>
    let box = document.querySelectorAll(".box");
    let box1 = document.getElementById("box1");
    let box2 = document.getElementById("box2");
    let box3 = document.getElementById("box3");
    let box4 = document.getElementById("box4");
    let boxCan = -102.5;
    let boxCan_value = 0;
    l_btn.style.visibility = "hidden";

    function rightClick() {
        if (boxCan_value > boxCan * 2) {
            boxCan_value += boxCan;
            l_btn.style.visibility = "";
            box.forEach((item) => item.style.transform = `translateX(${boxCan_value}%)`);
        } else if(boxCan_value == boxCan * 2) {
            boxCan_value += boxCan;
            r_btn.style.visibility = "hidden";
            box.forEach((item) => item.style.transform = `translateX(${boxCan_value}%)`);
        }
    }
    function leftClick() {
        if (boxCan_value < boxCan) {
            boxCan_value -= boxCan;
            r_btn.style.visibility = "";
            box.forEach((item) => item.style.transform = `translateX(${boxCan_value}%)`);
        } else if(boxCan_value == boxCan) {
            boxCan_value -= boxCan;
            l_btn.style.visibility = "hidden";
            box.forEach((item) => item.style.transform = `translateX(${boxCan_value}%)`);
        }
    } 

    r_btn.addEventListener("click", rightClick);
    l_btn.addEventListener("click",leftClick);



    </script>
</body>
</html>
